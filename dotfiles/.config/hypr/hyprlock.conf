# BACKGROUND
background {
    monitor =
    path = screenshot
    blur_passes = 2
    blur_size = 5
    contrast = 0.8916
    brightness = 0.6
    vibrancy = 0.4
    vibrancy_darkness = 0.2
}

# GENERAL
general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = false
}

# ── CARD BACKGROUND ─────────────────────────────────────────
shape {
    monitor =
    size = 340, 420                        # expanded height to fit attempts counter
    color = rgba(29, 32, 33, 0.92)         # Gruvbox hard bg
    rounding = 16
    border_size = 2
    border_color = rgba(215, 153, 33, 0.45) # Gruvbox yellow, subtle
    rotate = 0
    xray = false
    position = 0, 0
    halign = center
    valign = center
}

# ── PROFILE PHOTO (floating above card) ─────────────────────
image {
    monitor =
    path = ~/.config/hypr/hyprlock/pfp.png
    border_size = 3
    border_color = rgba(235, 219, 178, 0.90) # Gruvbox fg
    size = 90
    rounding = -1
    rotate = 0
    reload_time = -1
    reload_cmd =
    position = 0, 198
    halign = center
    valign = center
}

# ── USERNAME (below pfp, top of card) ───────────────────────
label {
    monitor =
    text = $USER
    color = rgba(235, 219, 178, 0.90)      # Gruvbox fg
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    position = 0, 115
    halign = center
    valign = center
}

# ── TIME ────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%H:%M")</span>"
    color = rgba(235, 219, 178, 1.0)       # Gruvbox fg
    font_size = 64
    font_family = JetBrainsMono Nerd Font
    position = 0, 50
    halign = center
    valign = center
}

# ── DATE ────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %B %d")"
    color = rgba(168, 153, 132, 0.85)      # Gruvbox fg4 muted
    font_size = 15
    font_family = JetBrainsMono Nerd Font
    position = 0, -20
    halign = center
    valign = center
}

# ── USER BOX ────────────────────────────────────────────────
shape {
    monitor =
    size = 290, 48
    color = rgba(50, 48, 47, 0.90)         # Gruvbox bg2
    rounding = 24
    border_size = 0
    border_color = rgba(0, 0, 0, 0)
    rotate = 0
    xray = false
    position = 0, -85
    halign = center
    valign = center
}

label {
    monitor =
    text =    $USER
    color = rgba(168, 153, 132, 0.90)      # Gruvbox fg4
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 0, -85
    halign = center
    valign = center
}

# ── INPUT FIELD ─────────────────────────────────────────────
input-field {
    monitor =
    size = 290, 48
    outline_thickness = 0
    dots_size = 0.25
    dots_spacing = 0.20
    dots_center = true
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(50, 48, 47, 0.90)   # Gruvbox bg2
    font_color = rgba(235, 219, 178, 1.0)  # Gruvbox fg
    check_color = rgba(142, 192, 124, 1.0) # Gruvbox green
    fail_color = rgba(251, 73, 52, 1.0)    # Gruvbox red
    fade_on_empty = false
    font_family = JetBrainsMono Nerd Font
    placeholder_text = <span foreground="##a89984"></span>
    hide_input = false
    rounding = 24
    position = 0, -145
    halign = center
    valign = center
}

# ── FAILED ATTEMPTS COUNTER ─────────────────────────────────
label {
    monitor =
    text = cmd[update:1000] attempts=$ATTEMPTS; [ $attempts -gt 0 ] && echo "󰒃  $attempts failed attempt$([ $attempts -gt 1 ] && echo s)" || echo ""
    color = rgba(251, 73, 52, 1.0)         # Gruvbox red
    font_size = 13
    font_family = JetBrainsMono Nerd Font
    position = 0, -205
    halign = center
    valign = center
}