###################
### KEYBINDINGS ###
###################
# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more

# name: Terminal
bind = $mainMod, RETURN, exec, $terminal

# name: Kill active window
bind = $mainMod, Q, killactive,

# name: Hyprlock
bind = $mainMod, L, exec, hyprlock

# name: File Manager
bind = $mainMod, E, exec, $fileManager

# name: Keybinds list
bind = $mainMod, K, exec, ~/.config/rofi/scripts/keybinds.sh

# name: Config quick-nav
bind = $mainMod, N, exec, ~/.config/rofi/scripts/config-navigation.sh

# name: Toggle floating window
bind = $mainMod, V, togglefloating,

# name: Application launcher
bind = CTRL $mainMod, RETURN, exec, $menu

# name: Pseudo tile (dwindle)
bind = $mainMod, P, pseudo,

# name: Toggle split (dwindle)
bind = $mainMod, J, togglesplit,

# name: Browser
bind = $mainMod, B, exec, $browser

# name: Reload waybar
bind = $mainMod, W, exec, ~/.config/waybar/scripts/launch.sh

# name: Fullscreen
bind = $mainMod, F, fullscreen

# name: Screenshot (region)
bind = $mainMod, S, exec, grim -g "$(slurp)" - | swappy -f - | tee >(wl-copy)

# name: Clipboard manager
bind = $mainMod, C, exec, 'clipse-gui'

# name: Emoji picker
bind = $mainMod, PERIOD, exec, ~/.config/hypr/scripts/emoji-picker.sh

# name: Move focus left
bind = $mainMod, left, movefocus, l

# name: Move focus right
bind = $mainMod, right, movefocus, r

# name: Move focus up
bind = $mainMod, up, movefocus, u

# name: Move focus down
bind = $mainMod, down, movefocus, d

# name: Workspace 1
bind = $mainMod, 1, workspace, 1

# name: Workspace 2
bind = $mainMod, 2, workspace, 2

# name: Workspace 3
bind = $mainMod, 3, workspace, 3

# name: Workspace 4
bind = $mainMod, 4, workspace, 4

# name: Workspace 5
bind = $mainMod, 5, workspace, 5

# name: Workspace 6
bind = $mainMod, 6, workspace, 6

# name: Workspace 7
bind = $mainMod, 7, workspace, 7

# name: Workspace 8
bind = $mainMod, 8, workspace, 8

# name: Workspace 9
bind = $mainMod, 9, workspace, 9

# name: Workspace 10
bind = $mainMod, 0, workspace, 10

# name: Move to workspace 1
bind = $mainMod SHIFT, 1, movetoworkspace, 1

# name: Move to workspace 2
bind = $mainMod SHIFT, 2, movetoworkspace, 2

# name: Move to workspace 3
bind = $mainMod SHIFT, 3, movetoworkspace, 3

# name: Move to workspace 4
bind = $mainMod SHIFT, 4, movetoworkspace, 4

# name: Move to workspace 5
bind = $mainMod SHIFT, 5, movetoworkspace, 5

# name: Move to workspace 6
bind = $mainMod SHIFT, 6, movetoworkspace, 6

# name: Move to workspace 7
bind = $mainMod SHIFT, 7, movetoworkspace, 7

# name: Move to workspace 8
bind = $mainMod SHIFT, 8, movetoworkspace, 8

# name: Move to workspace 9
bind = $mainMod SHIFT, 9, movetoworkspace, 9

# name: Move to workspace 10
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# name: Terminal scratchpad

bind = $mainMod, T, exec, hyprscratch term "[size 75% 75%] foot --title term"

# name: NeoVim scratchpad
bind = $mainMod, y, exec, hyprscratch notes "[size 60% 70%] foot --title notes -e nvim"

# name: Next workspace (scroll)
bind = $mainMod, mouse_down, workspace, e+1

# name: Previous workspace (scroll)
bind = $mainMod, mouse_up, workspace, e-1

# name: Move window (mouse)
bindm = $mainMod, mouse:272, movewindow

# name: Resize window (mouse)
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness

# name: Volume up
bindel = , XF86AudioRaiseVolume, exec, ~/.config/hypr/scripts/volume-notify.sh --inc

# name: Volume down
bindel = , XF86AudioLowerVolume, exec, ~/.config/hypr/scripts/volume-notify.sh --dec

# name: Toggle mute
bindel = , XF86AudioMute, exec, ~/.config/hypr/scripts/volume-notify.sh --toggle

# name: Brightness up
bindel = , XF86MonBrightnessUp, exec, ~/.config/hypr/scripts/brightness-notify.sh --inc

# name: Brightness down
bindel = , XF86MonBrightnessDown, exec, ~/.config/hypr/scripts/brightness-notify.sh --dec

# name: Next track
bindl = , XF86AudioNext, exec, playerctl next

# name: Play/Pause
bindl = , XF86AudioPause, exec, playerctl play-pause

# name: Play/Pause
bindl = , XF86AudioPlay, exec, playerctl play-pause

# name: Previous track
bindl = , XF86AudioPrev, exec, playerctl previous
